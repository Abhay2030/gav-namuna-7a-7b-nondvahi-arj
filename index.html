        2. महाराष्ट्र जमीन महसूल नोंदवही नियम, 1971

महोदय,
मी खाली सही करणारा अर्जदार, आपणास विनम्रतेने सादर करतो की, मा. मुंबई उच्च न्यायालय, औरंगाबाद खंडपीठ यांनी दिनांक 23 मार्च 2026 रोजी दिलेल्या आदेशानुसार (Writ Petition No. 5599 of 2021), महाराष्ट्र जमीन महसूल नोंदवही नियम, 1971 अंतर्गत गाव नमुना ७-अ व ७-ब या नोंदवही नियमितपणे ठेवणे तसेच संबंधित शेतकऱ्यांना त्याचे प्रमाणित उतारे उपलब्ध करून देणे ही संबंधित महसूल यंत्रणेची वैधानिक व बंधनकारक जबाबदारी आहे.
