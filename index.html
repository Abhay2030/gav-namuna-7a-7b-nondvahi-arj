<!DOCTYPE html>
<html lang="mr">

<head>

    <style>
        body {

            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f2f5;
            margin: 0;
        }

        .card {
            background: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 500px;
            width: 90%;
        }

        h2 {
            color: #333;
            font-size: 22px;
            margin-bottom: 10px;
        }

        p {
            color: #666;
            font-size: 16px;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .alert-box {
            background-color: #fff3cd;
            color: #856404;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ffeeba;
            font-size: 15px;
            font-weight: bold;
            margin-bottom: 25px;
            text-align: left;
        }

        .email-btn {
            background-color: #EA4335;
            /* Gmail Red */
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.1s ease;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .email-btn:hover {
            background-color: #C5221F;
        }

        .email-btn:active {
            transform: scale(0.98);
        }

</head>

</html>
